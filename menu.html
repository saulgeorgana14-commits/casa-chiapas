<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Casa Chiapas | Mariscos y Más en Reforma, Chiapas</title>
<meta name="description" content="Menú completo Casa Chiapas: cócteles, camarones, caldos, carnes, pescados, tacos y bebidas. Pide a domicilio vía WhatsApp.">
<link rel="canonical" href="https://casa-chiapas.vercel.app/menu.html">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--cta:#FFBF00;--nav:#1a0a2e;--acento:#D81B60;--borde:#8B1A4A;--fondo:#0d0520;--texto:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--fondo);color:var(--texto);padding-bottom:120px}
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(13,5,32,.97);display:flex;justify-content:space-between;padding:0 20px;height:90px;align-items:center;border-bottom:2px solid var(--borde);backdrop-filter:blur(10px)}
.nav-logo img{height:75px;width:auto}
.cart-btn{background:var(--cta);border:none;padding:8px 18px;border-radius:20px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:8px;color:#1a0a2e;font-family:'Nunito',sans-serif;font-size:.9rem}

/* FLORAL BAR */
.floral-bar{width:100%;height:150px;background-image:url('pattern.png');background-repeat:repeat-x;background-size:auto 100%;animation:mover-barra 40s linear infinite}
.floral-bar.reverse{animation:mover-barra-reverse 40s linear infinite}
@keyframes mover-barra {
  from { background-position: 0 0; }
  to { background-position: 100% 0; }
}
@keyframes mover-barra-reverse {
  from { background-position: 0 0; }
  to { background-position: -100% 0; }
}

.container{max-width:1200px;margin:0 auto;padding:20px 15px}
.cat-nav{background:rgba(255,255,255,.05);padding:10px 15px;position:sticky;top:90px;z-index:90;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid rgba(200,0,110,.3);scrollbar-width:none}
.cat-nav::-webkit-scrollbar{display:none}
.cat-link{white-space:nowrap;padding:7px 16px;background:rgba(255,255,255,.06);text-decoration:none;border-radius:20px;font-size:.82rem;font-weight:800;color:rgba(255,255,255,.8);border:1px solid rgba(200,0,110,.2);transition:all .2s}
.cat-link:hover,.cat-link.active{background:var(--borde);color:#fff;border-color:var(--borde)}

.category-section{margin-bottom:48px}
.category-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--cta);margin-bottom:20px;border-bottom:2px solid rgba(200,0,110,.4);padding-bottom:10px;display:flex;align-items:center;gap:10px}
.category-subtitle{font-size:.82rem;color:rgba(255,255,255,.5);font-weight:600;margin-bottom:20px;margin-top:-12px}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
@media(min-width:768px){.menu-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}}

.card{background:rgba(255,255,255,.05);border-radius:14px;overflow:hidden;border:1px solid rgba(200,0,110,.2);display:flex;flex-direction:column;transition:all .3s;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(200,0,110,.2);border-color:rgba(200,0,110,.5)}
.card img{width:100%;height:150px;object-fit:cover}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column;justify-content:space-between}
.card-name{font-weight:800;font-size:.95rem;margin-bottom:4px;color:#fff}
.card-desc{font-size:.75rem;color:rgba(255,255,255,.55);margin-bottom:8px;line-height:1.4}
.card-price{color:var(--cta);font-weight:900;font-size:1.05rem;margin-bottom:10px}
.add-btn{background:var(--borde);color:#fff;border:none;padding:9px;border-radius:8px;cursor:pointer;font-weight:800;font-size:.82rem;transition:background .2s;font-family:'Nunito',sans-serif}
.add-btn:hover{background:var(--acento)}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;z-index:1000;padding:20px;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-content{background:#1a0a2e;border:1px solid var(--borde);width:100%;max-width:450px;border-radius:20px;padding:25px;max-height:90vh;overflow-y:auto}
.cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid rgba(200,0,110,.3);padding-bottom:10px}
.cart-header h3{font-family:'Playfair Display',serif;font-size:1.3rem}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.item-info b{color:var(--cta);display:block;font-size:.9rem}
.item-info span{font-size:.8rem;color:rgba(255,255,255,.6)}
.qty-controls{display:flex;align-items:center;gap:10px}
.qty-btn{background:rgba(255,255,255,.1);border:none;width:28px;height:28px;border-radius:6px;cursor:pointer;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem}
.qty-btn:hover{background:var(--borde)}

.checkout-form{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.checkout-form label{font-weight:800;font-size:.85rem;color:var(--cta)}
.checkout-form select,.checkout-form input{padding:10px 12px;border-radius:10px;border:1px solid rgba(200,0,110,.4);background:rgba(255,255,255,.07);color:#fff;font-family:'Nunito',sans-serif;font-weight:600;font-size:.9rem}
.checkout-form select:focus,.checkout-form input:focus{outline:none;border-color:var(--cta)}
.checkout-form select option{background:#1a0a2e}

.total-row{background:rgba(200,0,110,.1);padding:14px;border-radius:10px;margin-top:16px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(200,0,110,.3)}
.total-label{font-weight:700}
.total-amount{font-weight:900;font-size:1.4rem;color:var(--cta)}

.btn-send{background:#25D366;color:#fff;border:none;padding:14px;border-radius:12px;font-weight:900;cursor:pointer;margin-top:14px;font-size:1rem;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:'Nunito',sans-serif}
.btn-close{background:rgba(255,255,255,.1);color:#fff;border:none;padding:11px;border-radius:12px;margin-top:8px;cursor:pointer;width:100%;font-weight:700;font-family:'Nunito',sans-serif}
.btn-clear{background:transparent;color:var(--acento);border:none;cursor:pointer;font-size:.85rem;font-weight:700;text-decoration:underline;font-family:'Nunito',sans-serif}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><img src="img/pdf/page1_img1.png" alt="Casa Chiapas"></a>
  <button class="cart-btn" onclick="toggleCart()">🛒 Mi Pedido (<span id="cart-count">0</span>)</button>
</nav>

<div class="floral-bar" style="margin-top:90px"></div>

<div class="cat-nav">
  <a href="#cocteles" class="cat-link">🍹 Cócteles y Entradas</a>
  <a href="#camarones" class="cat-link">🦐 Camarones</a>
  <a href="#caldos" class="cat-link">🍲 Caldos</a>
  <a href="#especialidades" class="cat-link">⭐ Especialidades</a>
  <a href="#tacos" class="cat-link">🌮 Tacos y Tostadas</a>

  <a href="#carne" class="cat-link">🥩 Carne / Niños</a>
  <a href="#bebidas" class="cat-link">🍺 Bebidas</a>

<div class="container">
  <div id="menu-sections"></div>
</div>

<div class="modal" id="cart-modal">
  <div class="modal-content">
    <div class="cart-header">
      <h3>🛒 Tu Pedido</h3>
      <button class="btn-clear" onclick="clearCart()">Vaciar</button>
    </div>
    <div id="cart-list"></div>
    <div class="checkout-form">
      <label>¿Cómo recibes?</label>
      <select id="delivery-type" onchange="updateTotal()">
        <option value="pickup">Pasar a buscar (Gratis)</option>
        <option value="delivery">A domicilio (+ $30 envío)</option>
      </select>
      <label>Método de Pago:</label>
      <select id="payment-method">
        <option value="Efectivo">Efectivo</option>
        <option value="Tarjeta">Tarjeta (Terminal)</option>
        <option value="Transferencia">Transferencia</option>
      </select>
      <label>Tu Nombre:</label>
      <input type="text" id="customer-name" placeholder="Escribe tu nombre">
      <input type="text" id="customer-address" placeholder="Dirección (si es a domicilio)">
    </div>
    <div class="total-row">
      <span class="total-label">Total a pagar:</span>
      <span class="total-amount">$<span id="total">0</span></span>
    </div>
    <button class="btn-send" onclick="sendOrder()">🚀 Enviar por WhatsApp</button>
    <button class="btn-close" onclick="toggleCart()">Seguir viendo el menú</button>
  </div>
</div>

];

let cart = JSON.parse(localStorage.getItem('cc_cart')) || [];

function renderMenu(){
  const container = document.getElementById('menu-sections');
  container.innerHTML = categories.map((cat, index) => {
    const bar = index < categories.length - 1 ? `<div class="floral-bar ${index % 2 === 0 ? 'reverse' : ''}"></div>` : '';
    return `
      <section class="category-section" id="${cat.id}">
        <h2 class="category-title">${cat.icon} ${cat.name}</h2>
        <div class="menu-grid">
          ${menu.filter(i => i.cat === cat.id).map(item => `
            <div class="card">
              <img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.src='img/pdf/page2_img1.jpeg'">
              <div class="card-body">
                <div>
                  <p class="card-name">${item.name}</p>
                  ${item.desc ? `<p class="card-desc">${item.desc}</p>` : ''}
                </div>
                <div>
                  <p class="card-price">$${item.price.toLocaleString()}</p>
                  <button class="add-btn" onclick="addToCart(${item.id})">+ Agregar</button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </section>
      ${bar}
    `;
  }).join('');
}

function addToCart(id){
  const item = menu.find(m => m.id === id);
  const inCart = cart.find(c => c.id === id);
  if(inCart) inCart.qty++; else cart.push({...item, qty:1});
  saveCart();
  // brief visual feedback
  const btns = document.querySelectorAll('.add-btn');
  btns.forEach(b => { if(b.onclick.toString().includes(id)){ b.textContent='✓ Agregado'; setTimeout(()=>b.textContent='+ Agregar',800); }});
}

function saveCart(){ localStorage.setItem('cc_cart', JSON.stringify(cart)); updateCartCount(); renderCart(); }
function updateCartCount(){ document.getElementById('cart-count').innerText = cart.reduce((s,i)=>s+i.qty,0); }
function toggleCart(){ const m=document.getElementById('cart-modal'); m.style.display=m.style.display==='flex'?'none':'flex'; }

function renderCart(){
  const list = document.getElementById('cart-list');
  if(!cart.length){ list.innerHTML='<p style="text-align:center;padding:20px;color:rgba(255,255,255,.5)">Tu carrito está vacío</p>'; updateTotal(); return; }
  list.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="item-info"><b>${item.name}</b><span>$${item.price} c/u</span></div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span style="font-weight:800;min-width:20px;text-align:center">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
      </div>
    </div>
  `).join('');
  updateTotal();
}

function changeQty(id,d){ const item=cart.find(c=>c.id===id); item.qty+=d; if(item.qty<=0)cart=cart.filter(c=>c.id!==id); saveCart(); }
function clearCart(){ if(confirm('¿Vaciar pedido?')){cart=[];saveCart();} }
function updateTotal(){ let sub=cart.reduce((s,i)=>s+(i.price*i.qty),0); const d=document.getElementById('delivery-type').value==='delivery'?30:0; document.getElementById('total').innerText=(sub+d).toLocaleString(); }

function sendOrder(){
  if(!cart.length) return alert('Agrega algo al carrito primero');
  const name=document.getElementById('customer-name').value;
  const type=document.getElementById('delivery-type').value;
  const address=document.getElementById('customer-address').value;
  const payment=document.getElementById('payment-method').value;
  if(!name) return alert('Por favor dinos tu nombre');
  if(type==='delivery'&&!address) return alert('Necesitamos tu dirección');
  let text=`*CASA CHIAPAS - NUEVO PEDIDO*\n\n`;
  text+=`👤 *Cliente:* ${name}\n`;
  text+=`🛵 *Entrega:* ${type==='delivery'?'A domicilio':'Pasar a buscar'}\n`;
  if(type==='delivery') text+=`📍 *Dirección:* ${address}\n`;
  text+=`💳 *Pago:* ${payment}\n\n*PEDIDO:*\n`;
  cart.forEach(i=>{ text+=`- ${i.qty}x ${i.name} ($${(i.price*i.qty).toLocaleString()})\n`; });
  text+=`\n💰 *TOTAL: $${document.getElementById('total').innerText}*`;
  window.open(`https://wa.me/529171008191?text=${encodeURIComponent(text)}`,'_blank');
}

// Cat nav active on scroll
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      document.querySelectorAll('.cat-link').forEach(l=>l.classList.remove('active'));
      const link=document.querySelector(`.cat-link[href="#${e.target.id}"]`);
      if(link){link.classList.add('active');link.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
    }
  });
},{threshold:.3});

renderMenu();
updateCartCount();
renderCart();
document.querySelectorAll('.category-section').forEach(s=>observer.observe(s));
</script>
</body>
</html>
